name: Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install numpy pytest tiktoken transformers datasets

    - name: Verify imports
      run: |
        python -c "import torch; print(f'PyTorch {torch.__version__}')"
        python -c "import numpy; print(f'NumPy {numpy.__version__}')"
        python -c "
        from model import GPT, GPTConfig
        config = GPTConfig(n_layer=2, n_head=2, n_embd=64, block_size=32, vocab_size=100)
        model = GPT(config)
        print(f'GPT model created: {model.get_num_params()/1e3:.1f}K params')
        "

    - name: Run model unit tests
      run: |
        python -c "
        import torch
        from model import GPT, GPTConfig

        # Test 1: Model creation
        config = GPTConfig(n_layer=2, n_head=2, n_embd=64, block_size=32, vocab_size=256)
        model = GPT(config)
        print('PASS: Model creation')

        # Test 2: Forward pass without targets (returns last token logits only)
        idx = torch.randint(0, 256, (2, 16))
        logits, loss = model(idx)
        assert logits.shape == (2, 1, 256), f'Expected (2,1,256), got {logits.shape}'
        assert loss is None, 'Loss should be None without targets'
        print('PASS: Forward pass shape correct (inference mode)')

        # Test 3: Forward pass with targets (returns all logits + loss)
        targets = torch.randint(0, 256, (2, 16))
        logits, loss = model(idx, targets)
        assert logits.shape == (2, 16, 256), f'Expected (2,16,256), got {logits.shape}'
        assert loss is not None, 'Loss should not be None with targets'
        assert loss.item() > 0, 'Loss should be positive'
        print(f'PASS: Loss computation (loss={loss.item():.4f})')

        # Test 4: Generate
        gen = model.generate(idx[:1, :8], max_new_tokens=10)
        assert gen.shape == (1, 18), f'Expected (1,18), got {gen.shape}'
        print('PASS: Generation')

        # Test 5: crop_block_size
        model.crop_block_size(16)
        assert model.config.block_size == 16
        idx_short = torch.randint(0, 256, (1, 10))
        targets_short = torch.randint(0, 256, (1, 10))
        logits, _ = model(idx_short, targets_short)
        assert logits.shape == (1, 10, 256)
        print('PASS: crop_block_size')

        # Test 6: get_num_params
        n = model.get_num_params()
        assert n > 0, 'Param count should be positive'
        print(f'PASS: get_num_params = {n}')

        print()
        print('All 6 tests passed!')
        "

    - name: Run config validation
      run: |
        python -c "
        # Validate all config files are valid Python
        import importlib.util, sys, os

        configs = ['config/train_gpt2.py', 'config/train_shakespeare_char.py',
                   'config/finetune_shakespeare.py', 'config/eval_gpt2.py',
                   'config/eval_gpt2_medium.py', 'config/eval_gpt2_large.py',
                   'config/eval_gpt2_xl.py']

        for cfg in configs:
            if os.path.exists(cfg):
                spec = importlib.util.spec_from_file_location('cfg', cfg)
                mod = importlib.util.module_from_spec(spec)
                spec.loader.exec_module(mod)
                print(f'PASS: {cfg} loads successfully')
            else:
                print(f'SKIP: {cfg} not found')

        print()
        print('All config validations passed!')
        "
