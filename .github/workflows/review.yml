name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**.py'

permissions:
  contents: read
  pull-requests: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD -- '*.py' > pr_diff.txt
          echo "diff_size=$(wc -c < pr_diff.txt | tr -d ' ')" >> $GITHUB_OUTPUT

      - name: Run Claude Code Review
        if: steps.diff.outputs.diff_size != '0'
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DIFF_CONTENT=$(cat pr_diff.txt)

          REVIEW=$(claude --print "You are a code reviewer for the nanoGPT project. Review this PR diff and provide feedback as a markdown comment. Focus on:
          1. Correctness of the change
          2. PyTorch best practices
          3. Potential issues or improvements

          PR Diff:
          $DIFF_CONTENT

          Provide a structured review with sections: Summary, Findings (if any), and Verdict (approve/request changes).")

          # Save review to file
          echo "$REVIEW" > review_output.md
          echo "has_review=true" >> $GITHUB_OUTPUT

      - name: Post Review Comment on PR
        if: steps.review.outputs.has_review == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const review = fs.readFileSync('review_output.md', 'utf8');

            const comment = `## 🤖 Claude Code Review\n\n${review}\n\n---\n*Automated review by Claude Code in CI/CD (Domain 3.6)*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
