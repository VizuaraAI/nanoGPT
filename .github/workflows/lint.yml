name: Lint

on:
  pull_request:
    branches: [ main, master ]
    paths:
      - '**.py'
  push:
    branches: [ main, master ]
    paths:
      - '**.py'

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort

    - name: Run flake8 (syntax errors and undefined names only)
      run: |
        echo "Checking for syntax errors and undefined names..."
        flake8 model.py train.py sample.py --select=E9,F63,F7,F82 --show-source --statistics
        echo "PASS: No syntax errors or undefined names"

    - name: Run flake8 (style warnings)
      continue-on-error: true
      run: |
        echo "Checking code style (non-blocking)..."
        flake8 model.py train.py --max-line-length=120 --extend-ignore=E203,W503,E501 --statistics || true

    - name: Run black --check
      continue-on-error: true
      run: |
        echo "Checking formatting with black..."
        black --check --diff --line-length=120 model.py train.py || echo "Note: black would reformat some files (non-blocking)"

    - name: Run isort --check
      continue-on-error: true
      run: |
        echo "Checking import order with isort..."
        isort --check-only --diff --profile black model.py train.py || echo "Note: isort would reorder some imports (non-blocking)"

    - name: Summary
      run: echo "Lint checks complete. Only syntax errors block the build."
